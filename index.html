<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AccountCreation</title>

    <style>
    input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ebe6f5;
    border-radius: 4px;
    box-sizing: border-box;
    margin-top: 6px;
    margin-bottom: 16px;
    }
     body {
    background-image: url('https://static.vecteezy.com/system/resources/thumbnails/020/580/331/small/abstract-smooth-blur-blue-color-gradient-mesh-texture-lighting-effect-background-with-blank-space-for-website-banner-and-paper-card-decorative-modern-graphic-design-vector.jpg');
    background-size: cover;           
    background-position: center center; 
    background-repeat: no-repeat;     
    background-attachment: fixed;      
    }
    input[type=submit] {
    background-color: #030647;
     color: rgb(247, 245, 245);
    }
    input[type=submit] {
    background-color: #03023f;
    color: white;
    }
    .container {
    background-color: #f1f1f1;
    padding: 20px;
    }
    #message {
    display:none;
    background: #f1f1f1;
    color: #000;
    position: relative;
    padding: 20px;
    margin-top: 10px;
    }
    #message p {
    padding: 10px 35px;
    font-size: 18px;
    }
    .valid {
    color: green;
    }
    .valid:before {
    position: relative;
    left: -35px;
    content: "✔";
    }
    .invalid {
  color: red;
    }
    .invalid:before {
    position: relative;
    left: -35px;
    content: "✖";
    }
    </style>

    </head>
    <body>

<h3>Create Password</h3>
<p>Sign Up</p>

<div class="container">
  <form action="/action_page.php">
    <label for="usrname">Username</label>
    <input type="text" id="usrname" name="usrname" required>

    <label for="psw">Password</label>
    <input type="password" id="psw" name="psw" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Password must contain at least one letter and one number, and must at least be 7 characters long" required>
    
  <input type="submit" value="Submit">
  <button id="check">Sign</button>
  </form>
</div>
<div id="message">
  <h3>Password must contain the following:</h3>
  <p id="letter" class="invalid">A <b>lowercase</b> letter</p>
  <p id="number" class="invalid">A <b>number</b></p>
  <p id="length" class="invalid">Minimum <b>7 characters</b></p>

</div>
